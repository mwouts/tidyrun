name: Publish to PyPI
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tidyrun
    permissions:
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.1
        with:
          pixi-version: v0.68.1
          cache: true
      - name: Build package
        run: pixi run -e build python -m build

      - name: Verify wheel exports
        shell: bash
        run: |
          python3 -m venv .wheel-check
          .wheel-check/bin/pip install --upgrade pip
          .wheel-check/bin/pip install dist/tidyrun-*.whl
          .wheel-check/bin/python - <<'PY'
          import tidyrun

          assert isinstance(tidyrun.__version__, str)
          assert hasattr(tidyrun, "deserialize")
          from tidyrun import deserialize

          assert deserialize is tidyrun.deserialize
          PY
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
