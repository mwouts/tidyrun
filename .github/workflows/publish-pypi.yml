name: Publish to PyPI
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tidyrun
    permissions:
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.1
        with:
          pixi-version: latest
          cache: true
      - name: Build package
        run: pixi run -e build python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
